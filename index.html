<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華懋集團物業地圖 | Chinachem Group Property Map</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">◆</span>
                <div class="logo-text">
                    <h1 data-i18n="site.title">華懋集團物業地圖</h1>
                    <span class="subtitle" data-i18n="site.subtitle">Chinachem Group Property Portfolio</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="lang-toggle" id="lang-toggle" title="Switch Language">
                    <span class="lang-current">繁</span>
                    <span class="lang-separator">|</span>
                    <span class="lang-other">EN</span>
                </button>
                <div class="header-stats">
                    <div class="stat">
                        <span class="stat-number" id="total-count">0</span>
                        <span class="stat-label" data-i18n="stats.total">總物業數</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="filter-section" id="filter-section">
                <div class="filter-header">
                    <div class="filter-title-row">
                        <h3 data-i18n="filter.title">🏷️ 物業類型篩選</h3>
                        <span class="selected-filter-badge" id="selected-filter-badge"></span>
                    </div>
                    <button class="collapse-btn" id="collapse-filter" title="收起/展開">
                        <span class="collapse-icon">▼</span>
                    </button>
                </div>
                <div class="filter-buttons" id="filter-buttons">
                    <button class="filter-btn active" data-category="all">
                        <span class="icon">📋</span> <span data-i18n="filter.all">全部顯示</span>
                    </button>
                    <button class="filter-btn" data-category="commercial">
                        <span class="icon">🏢</span> <span data-i18n="filter.commercial">商業辦公</span>
                    </button>
                    <button class="filter-btn" data-category="retail">
                        <span class="icon">🛍️</span> <span data-i18n="filter.retail">零售商場</span>
                    </button>
                    <button class="filter-btn" data-category="residential">
                        <span class="icon">🏠</span> <span data-i18n="filter.residential">住宅項目</span>
                    </button>
                    <button class="filter-btn" data-category="hotel">
                        <span class="icon">🏨</span> <span data-i18n="filter.hotel">酒店服務</span>
                    </button>
                    <button class="filter-btn" data-category="healthcare">
                        <span class="icon">🏥</span> <span data-i18n="filter.healthcare">醫療護理</span>
                    </button>
                    <button class="filter-btn" data-category="other">
                        <span class="icon">📍</span> <span data-i18n="filter.other">其他設施</span>
                    </button>
                </div>
            </div>

            <div class="property-list-section">
                <h3 data-i18n="list.title">📑 物業列表</h3>
                <div class="search-box">
                    <input type="text" id="search-input" data-i18n-placeholder="search.placeholder" placeholder="搜尋物業名稱...">
                </div>
                <div class="property-list" id="property-list">
                    <!-- Property items will be inserted here -->
                </div>
            </div>
        </aside>

        <!-- Map Container -->
        <main class="map-container">
            <div id="map"></div>
            
            <!-- Legend -->
            <div class="legend">
                <h4 data-i18n="legend.title">圖例</h4>
                <div class="legend-item">
                    <span class="legend-icon commercial"></span>
                    <span data-i18n="legend.commercial">商業辦公</span>
                </div>
                <div class="legend-item">
                    <span class="legend-icon retail"></span>
                    <span data-i18n="legend.retail">零售商場</span>
                </div>
                <div class="legend-item">
                    <span class="legend-icon residential"></span>
                    <span data-i18n="legend.residential">住宅項目</span>
                </div>
                <div class="legend-item">
                    <span class="legend-icon hotel"></span>
                    <span data-i18n="legend.hotel">酒店服務</span>
                </div>
                <div class="legend-item">
                    <span class="legend-icon healthcare"></span>
                    <span data-i18n="legend.healthcare">醫療護理</span>
                </div>
                <div class="legend-item">
                    <span class="legend-icon other"></span>
                    <span data-i18n="legend.other">其他設施</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p data-i18n="footer.text">© 2026 POC Demo - 華懋集團物業地圖 | Data collected from public sources</p>
    </footer>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="properties-data.js"></script>
    <script src="app.js"></script>
</body>
</html>
